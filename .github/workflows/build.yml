name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Сборка APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Скачиваем код ─────────────────────────────────────────────────────
      - name: Скачать mimir-android
        uses: actions/checkout@v4
        with:
          path: mimir-android

      - name: Скачать mimir (Rust-библиотека)
        uses: actions/checkout@v4
        with:
          repository: Revertron/mimir
          path: mimir-master

      # ── 2. Кэш Rust ──────────────────────────────────────────────────────────
      - name: Кэш cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mimir-master/target
          key: cargo-${{ hashFiles('mimir-master/Cargo.lock') }}
          restore-keys: cargo-

      # ── 3. Rust ───────────────────────────────────────────────────────────────
      - name: Установить Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - name: Установить cargo-ndk
        run: cargo install cargo-ndk --locked

      # ── 4. Android SDK / NDK ─────────────────────────────────────────────────
      - name: Настроить Android SDK
        uses: android-actions/setup-android@v3

      - name: Установить NDK
        run: |
          sdkmanager "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      # ── 5. Собираем libmimir.so ───────────────────────────────────────────────
      - name: Собрать libmimir.so (arm64-v8a)
        working-directory: mimir-master
        run: cargo ndk --target aarch64-linux-android --platform 26 -o jniLibs build --release --package mimir

      - name: Собрать libmimir.so (armeabi-v7a)
        working-directory: mimir-master
        run: cargo ndk --target armv7-linux-androideabi --platform 26 -o jniLibs build --release --package mimir

      - name: Собрать libmimir.so (x86_64)
        working-directory: mimir-master
        run: cargo ndk --target x86_64-linux-android --platform 26 -o jniLibs build --release --package mimir

      # ── 6. Kotlin-биндинги ────────────────────────────────────────────────────
      - name: Собрать нативную библиотеку (host)
        working-directory: mimir-master
        run: cargo build -p mimir --lib

      - name: Сгенерировать mimir.kt
        working-directory: mimir-master
        run: |
          cargo run --bin uniffi-bindgen -- generate \
            --library target/debug/libmimir.so \
            --language kotlin \
            --out-dir kotlin-bindings

      # ── 7. Копируем в Android-проект ──────────────────────────────────────────
      - name: Копировать libmimir.so
        run: |
          mkdir -p mimir-android/app/src/main/jniLibs
          cp -r mimir-master/jniLibs/* mimir-android/app/src/main/jniLibs/
          find mimir-android/app/src/main/jniLibs -name "*.so" | sort

      - name: Копировать mimir.kt
        run: |
          mkdir -p mimir-android/app/src/main/java/uniffi/mimir
          cp mimir-master/kotlin-bindings/uniffi/mimir/mimir.kt \
             mimir-android/app/src/main/java/uniffi/mimir/mimir.kt

      # ── 8. Java ───────────────────────────────────────────────────────────────
      - name: Настроить Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 9. Gradle wrapper ─────────────────────────────────────────────────────
      - name: Настроить Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Скачать gradle-wrapper.jar
        working-directory: mimir-android
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v9.0.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Права на gradlew
        working-directory: mimir-android
        run: chmod +x gradlew

      # ── 10. Кэш Gradle ────────────────────────────────────────────────────────
      - name: Кэш Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mimir-android/**/*.gradle*', 'mimir-android/**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── 11. Собираем APK ──────────────────────────────────────────────────────
      - name: Собрать debug APK
        working-directory: mimir-android
        run: ./gradlew assembleDebug --no-daemon

      # ── 12. Сохраняем APK ─────────────────────────────────────────────────────
      - name: Сохранить APK
        uses: actions/upload-artifact@v4
        with:
          name: mimir-debug-${{ github.run_number }}
          path: mimir-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Результат
        run: |
          APK=mimir-android/app/build/outputs/apk/debug/app-debug.apk
          echo "✅ APK собран: $(du -sh $APK | cut -f1)"
